name: Static Site CI
on:
  schedule:
    - cron: "0 * * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - ".upptimerc.yml"
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  release:
    name: Build and deploy site
    runs-on: ubuntu-latest
    steps:
      - name: Build and deploy site
        uses: upptime/uptime-monitor@v1
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
