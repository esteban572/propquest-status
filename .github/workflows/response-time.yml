name: Response Time CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [response_time]
  workflow_dispatch:
jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
